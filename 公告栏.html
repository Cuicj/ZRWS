<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智壤卫士 - 土地资源公告栏</title>
  <style>
    :root {
      --bg: #F5F2ED;
      --card-bg: #FAFAF8;
      --ink: #2C261E;
      --ink-light: #3D3528;
      --muted: #8B7355;
      --muted-light: #A09080;
      --rule: #E8E2D9;
      --accent: #C9A86C;
      --accent-dark: #B8956A;
      --hero-start: #5D4E37;
      --hero-end: #C9A86C;
      --tag-top: #FF6C37;
      --tag-hot: #ff4b4b;
      --tag-rec: #6CA878;
      --level-province: #C96C6C;
      --level-city: #B8956A;
      --level-county: #6CA878;
      --level-township: #6C8CC9;
      --shadow: rgba(139, 115, 85, 0.08);
      --shadow-hover: rgba(139, 115, 85, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ===================== HEADER ===================== */
    .site-header {
      background: var(--ink);
      color: #fff;
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .site-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .site-brand {
      display: flex;
      flex-direction: column;
    }

    .site-brand .name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .site-brand .sub {
      font-size: 0.7rem;
      opacity: 0.7;
      letter-spacing: 0.1em;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .header-time {
      font-size: 0.8rem;
      opacity: 0.7;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .header-link {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      transition: all 0.2s;
    }

    .header-link:hover {
      color: var(--accent);
    }

    .header-link.back-main {
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(201, 168, 108, 0.2);
      border: 1px solid rgba(201, 168, 108, 0.4);
      color: #fff;
      font-weight: 500;
    }

    .header-link.back-main:hover {
      background: rgba(201, 168, 108, 0.35);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateX(-2px);
    }

    /* ===================== HERO ===================== */
    .hero {
      background: linear-gradient(135deg, var(--hero-start) 0%, #7A6548 50%, var(--hero-end) 100%);
      padding: 4rem 2rem 3.5rem;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(201,168,108,0.4) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 1.25rem;
    }

    .label-dot {
      width: 6px;
      height: 6px;
      background: var(--tag-top);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .hero-title {
      font-size: 2.25rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 1rem;
      max-width: 800px;
      cursor: pointer;
    }

    .hero-summary {
      font-size: 0.95rem;
      line-height: 1.8;
      opacity: 0.85;
      max-width: 700px;
      margin-bottom: 1.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta-tag {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .meta-tag.category {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    .meta-tag.level {
      background: rgba(255, 108, 55, 0.9);
    }

    .meta-text {
      font-size: 0.75rem;
      opacity: 0.8;
    }

    .read-more-btn {
      background: #fff;
      color: var(--hero-start);
      border: none;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-left: auto;
    }

    .read-more-btn:hover {
      background: var(--tag-top);
      color: #fff;
      transform: translateX(3px);
    }

    .hero-sub {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .sub-item {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      padding: 0.5rem;
      border-radius: 8px;
    }

    .sub-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .sub-tag {
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      font-size: 0.65rem;
      flex-shrink: 0;
      font-family: 'SF Mono', monospace;
    }

    .sub-title {
      flex: 1;
      font-size: 0.85rem;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sub-time {
      font-size: 0.7rem;
      opacity: 0.7;
      flex-shrink: 0;
      font-family: 'SF Mono', monospace;
    }

    /* ===================== CATEGORY NAV ===================== */
    .category-nav {
      background: var(--card-bg);
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 56px;
      z-index: 90;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .category-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
    }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 1rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .cat-btn:hover {
      color: var(--ink);
      background: var(--bg);
    }

    .cat-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .cat-icon {
      font-size: 1rem;
    }

    /* ===================== MAIN ===================== */
    .main-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
    }

    /* List Header */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .list-tabs {
      display: flex;
    }

    .list-tab {
      padding: 8px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .list-tab:hover { color: var(--ink); }
    .list-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--rule);
      border-radius: 24px;
      padding: 4px 6px 4px 16px;
      transition: border-color 0.2s;
    }

    .search-box:focus-within { border-color: var(--accent); }
    .search-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.8rem;
      color: var(--ink);
      width: 180px;
    }

    .search-btn {
      background: var(--accent);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .search-btn:hover { background: var(--accent-dark); }

    /* News List */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .news-item {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1.25rem;
      background: var(--card-bg);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .news-item:hover {
      border-color: #D4C8B8;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px var(--shadow-hover);
    }

    .news-cover {
      width: 220px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--bg) 0%, var(--rule) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .news-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cover-icon {
      font-size: 3rem;
      opacity: 0.5;
    }

    .news-body {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .news-tags {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .tag.primary { background: rgba(201,168,108,0.15); color: var(--accent-dark); }
    .tag.level-PROVINCE { background: rgba(201,108,108,0.15); color: var(--level-province); }
    .tag.level-CITY { background: rgba(201,168,108,0.2); color: var(--level-city); }
    .tag.level-COUNTY { background: rgba(108,168,120,0.15); color: var(--level-county); }
    .tag.level-TOWNSHIP { background: rgba(108,140,201,0.15); color: var(--level-township); }
    .tag.top { background: rgba(255,108,55,0.15); color: var(--tag-top); }
    .tag.hot { background: rgba(255,75,75,0.15); color: var(--tag-hot); }
    .tag.recommend { background: rgba(108,168,120,0.15); color: var(--tag-rec); }

    .news-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.5;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .news-summary {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 12px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted-light);
    }

    .author { color: var(--muted); font-weight: 500; }
    .dot { opacity: 0.5; }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.75rem;
      color: var(--muted-light);
    }

    .land-type {
      padding: 3px 10px;
      background: var(--bg);
      border-radius: 6px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .empty-list {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted-light);
    }

    .empty-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }

    /* ===================== SIDEBAR ===================== */
    .news-side {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .side-card {
      background: var(--card-bg);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 1.25rem;
    }

    .side-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #F0EBE3;
    }

    .side-icon { font-size: 1.1rem; }
    .side-title { font-size: 0.9rem; font-weight: 600; color: var(--ink); }

    .rank-list { display: flex; flex-direction: column; }
    .rank-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .rank-item:hover { background: var(--bg); }

    .rank-num {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted-light);
      background: var(--bg);
      border-radius: 4px;
      flex-shrink: 0;
    }

    .rank-num.top {
      background: linear-gradient(135deg, var(--tag-top) 0%, #FF8F5E 100%);
      color: #fff;
    }

    .rank-title {
      flex: 1;
      font-size: 0.8rem;
      color: var(--ink-light);
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .rank-views {
      font-size: 0.7rem;
      color: var(--muted-light);
      flex-shrink: 0;
      font-family: 'SF Mono', monospace;
    }

    .recommend-list { display: flex; flex-direction: column; gap: 10px; }
    .recommend-item {
      display: flex;
      gap: 10px;
      cursor: pointer;
      padding: 6px;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .recommend-item:hover { background: var(--bg); }

    .rec-cover {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--bg) 0%, var(--rule) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rec-icon { font-size: 1.5rem; opacity: 0.5; }
    .rec-body { flex: 1; min-width: 0; }

    .rec-title {
      font-size: 0.8rem;
      color: var(--ink-light);
      line-height: 1.5;
      margin: 0 0 4px 0;
      font-weight: 500;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .rec-time {
      font-size: 0.7rem;
      color: var(--muted-light);
    }

    .land-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .land-tag {
      padding: 6px 12px;
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .land-tag:hover { border-color: var(--accent); color: var(--accent); }
    .land-tag.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tag-count { font-size: 0.65rem; opacity: 0.8; font-family: 'SF Mono', monospace; }

    .stats-grid-mini {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-mini {
      text-align: center;
      padding: 1rem 8px;
      background: var(--bg);
      border-radius: 12px;
    }

    .stat-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Courier New', monospace;
    }

    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    /* ===================== DETAIL MODAL ===================== */
    .detail-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(44, 38, 30, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .detail-modal {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 800px;
      max-height: 88vh;
      position: relative;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease;
      overflow: hidden;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 20px;
      width: 36px;
      height: 36px;
      border: none;
      background: var(--bg);
      border-radius: 50%;
      font-size: 1.5rem;
      color: var(--muted);
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover { background: var(--rule); color: var(--ink); }

    .detail-scroll {
      max-height: 88vh;
      overflow-y: auto;
    }

    .detail-article { padding: 2.5rem 3rem; }

    .article-header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--rule); }

    .article-tags { display: flex; gap: 8px; margin-bottom: 1rem; }
    .article-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .article-summary {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      background: var(--bg);
      border-left: 4px solid var(--accent);
      border-radius: 0 8px 8px 0;
    }

    .summary-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
    }

    .article-summary p {
      margin: 8px 0 0 0;
      font-size: 0.875rem;
      color: var(--ink-light);
      line-height: 1.8;
    }

    .article-content {
      font-size: 0.95rem;
      line-height: 2;
      color: var(--ink-light);
      margin-bottom: 2rem;
      white-space: pre-wrap;
    }

    .article-footer { border-top: 1px solid var(--rule); padding-top: 1.5rem; }

    .footer-actions { display: flex; gap: 12px; margin-bottom: 1.5rem; }

    .action-btn {
      padding: 10px 20px;
      border: 1px solid var(--rule);
      background: #fff;
      border-radius: 12px;
      font-size: 0.875rem;
      color: var(--ink-light);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow-hover);
    }

    .action-btn.like {
      background: linear-gradient(135deg, var(--tag-top) 0%, #FF8F5E 100%);
      border-color: var(--tag-top);
      color: #fff;
    }

    .footer-keywords {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .kw-label { font-size: 0.8rem; color: var(--muted); }
    .kw-tag {
      padding: 4px 12px;
      background: var(--bg);
      border-radius: 16px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .footer-ai-summary {
      background: linear-gradient(135deg, rgba(201,168,108,0.08) 0%, rgba(184,149,106,0.08) 100%);
      border: 1px solid rgba(201,168,108,0.2);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .ai-head {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent-dark);
      margin-bottom: 8px;
    }

    .footer-ai-summary p {
      margin: 0;
      font-size: 0.8rem;
      color: var(--ink-light);
      line-height: 1.8;
    }

    /* ===================== LOAD MORE ===================== */
    .load-more {
      margin-top: 2rem;
      text-align: center;
    }

    .load-more-btn {
      padding: 12px 48px;
      background: var(--card-bg);
      border: 1px solid var(--rule);

  function formatDate(time) {
    if (!time) return '';
    const date = new Date(time);
    const now = new Date();
    const diff = now - date;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    if (days === 0) return '今天';
    if (days === 1) return '昨天';
    if (days < 7) return `${days}天前`;
    return date.toLocaleDateString('zh-CN');
  }

  function formatDateTime(time) {
    if (!time) return '';
    return new Date(time).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  }

        <span class="meta-tag level">${getLevelName(main.adminLevel)}</span>
        <span class="meta-text mono">${formatDate(main.publishTime)}</span>
        <span class="meta-text">👁️ ${main.viewCount || 0}</span>
        <button class="read-more-btn" onclick="openDetail(${main.announcementId})">阅读全文 →</button>
      </div>`;

    if (topItems.length > 1) {
      sub.innerHTML = topItems.slice(1, 3).map(item => `
        <div class="sub-item" onclick="openDetail(${item.announcementId})">
          <span class="sub-tag">${item.categoryName}</span>
          <span class="sub-title">${item.title}</span>
          <span class="sub-time">${formatDate(item.publishTime)}</span>
        </div>`).join('');
    } else {
      sub.innerHTML = '';
    }
  }

  function renderCategories() {
    const nav = document.getElementById('categoryNav');
    nav.innerHTML = `<button class="cat-btn ${!currentCategory ? 'active' : ''}" onclick="selectCategory(null)">
      <span class="cat-icon">📰</span><span class="cat-name">全部</span>
    </button>` +
    categories.map(c => `
      <button class="cat-btn ${currentCategory === c.categoryId ? 'active' : ''}" onclick="selectCategory(${c.categoryId})">
        <span class="cat-icon">${getCategoryIcon(c.categoryName)}</span>
        <span class="cat-name">${c.categoryName}</span>
      </button>`).join('');
  }

  function renderList() {
    const list = document.getElementById('newsList');
    let items = [...allData];

    // Category filter
    if (currentCategory) {
      items = items.filter(n => n.categoryId === currentCategory);
    }

    // Sort
    if (currentSort === 'hot') {
      items.sort((a, b) => (b.viewCount || 0) - (a.viewCount || 0));
    } else if (currentSort === 'recommend') {
      items = items.filter(n => n.isRecommend);
    }

    // Land type filter
    if (currentLandType) {
      items = items.filter(n => n.landType === currentLandType);
    }

    if (items.length === 0) {
      list.innerHTML = '<div class="empty-list"><span class="empty-icon">📭</span><p>暂无相关公告</p></div>';
      return;
    }

    list.innerHTML = items.map(item => `
      <div class="news-item" onclick="openDetail(${item.announcementId})">
        <div class="news-cover">
          <span class="cover-icon">${getCategoryIcon(item.categoryName)}</span>
        </div>
        <div class="news-body">
          <div class="news-tags">${buildTags(item)}</div>
          <h3 class="news-title">${item.title}</h3>
          <p class="news-summary">${item.summary || item.aiSummary}</p>
          <div class="news-footer">
            <div class="footer-left">
              <span class="author">${item.author || item.source || '智壤卫士'}</span>
              <span class="dot">·</span>
              <span class="mono">${formatDate(item.publishTime)}</span>
            </div>
            <div class="footer-right">
              <span>👁️ ${item.viewCount || 0}</span>
              <span>👍 ${item.likeCount || 0}</span>
              ${item.landType ? `<span class="land-type">${item.landType}</span>` : ''}
            </div>
          </div>
        </div>
      </div>`).join('');
  }

  function renderHotRank() {
    const el = document.getElementById('hotRank');
    const hot = allData.filter(n => n.isHot).sort((a, b) => (b.viewCount || 0) - (a.viewCount || 0)).slice(0, 8);
    el.innerHTML = hot.map((item, i) => `
      <div class="rank-item" onclick="openDetail(${item.announcementId})">
        <span class="rank-num ${i < 3 ? 'top' : ''}">${i + 1}</span>
        <span class="rank-title">${item.title}</span>
        <span class="rank-views mono">${item.viewCount || 0}</span>
      </div>`).join('');
  }

  function renderRecommend() {
    const el = document.getElementById('recommendList');
    const rec = allData.filter(n => n.isRecommend).slice(0, 5);
    el.innerHTML = rec.map(item => `
      <div class="recommend-item" onclick="openDetail(${item.announcementId})">
        <div class="rec-cover"><span class="rec-icon">${getCategoryIcon(item.categoryName)}</span></div>
        <div class="rec-body">
          <h4 class="rec-title">${item.title}</h4>
          <span class="rec-time mono">${formatDate(item.publishTime)}</span>
        </div>
      </div>`).join('');
  }

  function renderLandTags() {
    const el = document.getElementById('landTags');
    const landTypes = [...new Set(allData.filter(n => n.landType).map(n => n.landType))];
    el.innerHTML = landTypes.map(type => `
      <span class="land-tag ${currentLandType === type ? 'active' : ''}" onclick="filterLandType('${type}')">
        ${type}<span class="tag-count">${allData.filter(n => n.landType === type).length}</span>
      </span>`).join('');
  }

  function renderStats() {
    const el = document.getElementById('statsGrid');
    el.innerHTML = `
      <div class="stat-mini">
        <div class="stat-num">${allData.length}</div>
        <div class="stat-label">全部公告</div>
      </div>
      <div class="stat-mini">
        <div class="stat-num">${allData.filter(n => {
          const d = new Date(n.publishTime);
          const now = new Date();
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).length}</div>
        <div class="stat-label">本月新增</div>
      </div>`;
  }

  // ============ ACTIONS ============
  function selectCategory(id) {
    currentCategory = currentCategory === id ? null : id;
    renderCategories();
    renderList();
  }

  function filterLandType(type) {
    currentLandType = currentLandType === type ? null : type;
    renderLandTags();
    renderList();
  }

  function handleSearch() {
    const kw = document.getElementById('searchInput').value.trim();
    if (!kw) {
      loadData();
      return;
    }
    allData = MOCK_DATA.filter(n =>
      n.title.includes(kw) || (n.summary && n.summary.includes(kw)) || (n.keywords && n.keywords.includes(kw))
    );
    renderHero();
    renderList();
  }

  function openDetail(id) {
    const item = allData.find(n => n.announcementId === id);
    if (!item) return;
    document.getElementById('detailContent').innerHTML = `
      <article class="detail-article">
        <header class="article-header">
          <div class="article-tags">${buildTags(item)}</div>
          <h1 class="article-title">${item.title}</h1>
          <div class="article-meta">
            <span>${item.author || '智壤卫士编辑部'}</span>
            <span class="dot">·</span>
            <span class="mono">${formatDateTime(item.publishTime)}</span>
            <span class="dot">·</span>
            <span>阅读 ${item.viewCount || 0}</span>
            ${item.source ? `<span class="dot">·</span><span>${item.source}</span>` : ''}
          </div>
          ${item.summary ? `
          <div class="article-summary">
            <span class="summary-label">摘要</span>
            <p>${item.summary}</p>
          </div>` : ''}
        </header>
        <div class="article-content">${item.content}</div>
        <footer class="article-footer">
          <div class="footer-actions">
            <button class="action-btn like" onclick="handleLike(${item.announcementId})">👍 点赞 (${(item.likeCount || 0) + (item._liked ? 1 : 0)})</button>
            <button class="action-btn">🔗 分享</button>
          </div>
          ${item.aiKeywords ? `
          <div class="footer-keywords">
            <span class="kw-label">关键词：</span>
            ${item.aiKeywords.split(',').map(k => `<span class="kw-tag">${k.trim()}</span>`).join('')}
          </div>` : ''}
          ${item.aiSummary ? `
          <div class="footer-ai-summary">
            <div class="ai-head"><span>🤖</span><span>AI智能摘要</span></div>
            <p>${item.aiSummary}</p>
          </div>` : ''}
        </footer>
      </article>`;
    document.getElementById('detailOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeDetail(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('detailOverlay').style.display = 'none';
    document.body.style.overflow = '';
  }

  function handleLike(id) {
    const item = allData.find(n => n.announcementId === id);
    if (item) {
      item._liked = true;
      openDetail(id); // Re-render
    }
  }

  function loadMore() {
    // Placeholder for pagination
  }

  // ============ INIT ============
  function updateTime() {
    document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN', {
      year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  }

  async function loadData() {
    try {
      const [topRes, hotRes, recRes, catRes, listRes] = await Promise.all([
        fetch(`${API_BASE}/announcement/top`).then(r => r.json()).catch(() => ({ success: false })),
        fetch(`${API_BASE}/announcement/hot`).then(r => r.json()).catch(() => ({ success: false })),
        fetch(`${API_BASE}/announcement/recommend`).then(r => r.json()).catch(() => ({ success: false })),
        fetch(`${API_BASE}/announcement/category`).then(r => r.json()).catch(() => ({ success: false })),
        fetch(`${API_BASE}/announcement/list`).then(r => r.json()).catch(() => ({ success: false }))
      ]);

      if (listRes.success && listRes.list?.length) {
        allData = listRes.list;
      } else {
        allData = MOCK_DATA;
      }

      if (catRes.success && catRes.list?.length) {
        categories = catRes.list;
      } else {
        categories = MOCK_CATEGORIES;
      }
    } catch (e) {
      console.warn('API请求失败，使用Mock数据');
      allData = MOCK_DATA;
      categories = MOCK_CATEGORIES;
    }

    renderHero();
    renderCategories();
    renderList();
    renderHotRank();
    renderRecommend();
    renderLandTags();
    renderStats();
  }

  // Tab listeners
  document.getElementById('listTabs').addEventListener('click', e => {
    if (e.target.classList.contains('list-tab')) {
      document.querySelectorAll('.list-tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      currentSort = e.target.dataset.sort;
      renderList();
    }
  });

  // Search enter
  document.getElementById('searchInput').addEventListener('keyup', e => {
    if (e.key === 'Enter') handleSearch();
  });

  // ESC close modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });

  // Init
  updateTime();
  setInterval(updateTime, 1000);
  loadData();
</script>
</body>
</html>
