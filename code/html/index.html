<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智壤卫士 - 无人机地形数据采集与土质分析平台</title>

<!-- CDN 依赖 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.6/dist/index.css" />
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.6/dist/index.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

<style>
  :root {
    --primary: #2b6cb0; --accent: #38a169; --warning: #d69e2e;
    --danger: #e53e3e; --info: #4299e1;
    --bg: #f5f7fa; --panel: #fff;
    --text: #2d3748; --muted: #718096; --border: #e2e8f0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: "PingFang SC","Microsoft YaHei",sans-serif; background: var(--bg); color: var(--text); }
  #app { height: 100%; }

  /* Header */
  .app-header { height: 58px; background: linear-gradient(90deg,#1e3a5f,#2b6cb0); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 22px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
  .app-header .logo { display:flex; align-items:center; gap:10px; font-size:17px; font-weight:600; letter-spacing:1px; }
  .app-header .logo .el-icon { color:#ffd700; }
  .app-header .logo .sub { font-size:12px; color: rgba(255,255,255,.75); margin-left:6px; }
  .app-header .user-bar { display:flex; align-items:center; gap:14px; font-size:13px; }

  /* Container */
  .app-container { height: calc(100vh - 58px); display:flex; }

  /* Sidebar */
  .sidebar { width: 210px; background:#1e293b; color:#cbd5e0; overflow-y:auto; flex-shrink:0; }
  .sidebar .el-menu { border-right:none; }

  /* Main */
  .main-area { flex:1; overflow-y:auto; padding:16px 20px; }
  .page-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .page-title h2 { margin:0; font-size:19px; }
  .page-title .breadcrumb { font-size:12px; color:var(--muted); margin-top:3px; }

  /* Stat cards */
  .stat-row { display:grid; grid-template-columns: repeat(4,1fr); gap:14px; margin-bottom:14px; }
  .stat-card { background:var(--panel); border-radius:10px; padding:18px 20px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 6px rgba(0,0,0,.04); transition: transform .2s; }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card .label { font-size:13px; color:var(--muted); }
  .stat-card .value { font-size:24px; font-weight:700; margin-top:6px; font-family:Consolas,monospace; }
  .stat-card .trend { font-size:12px; color:var(--accent); margin-top:5px; }
  .stat-card .trend.down { color:var(--danger); }
  .stat-card .icon-box { width:48px; height:48px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:22px; }
  .ic-blue   { background: linear-gradient(135deg,#4299e1,#2b6cb0); }
  .ic-green  { background: linear-gradient(135deg,#48bb78,#38a169); }
  .ic-orange { background: linear-gradient(135deg,#ed8936,#d69e2e); }
  .ic-red    { background: linear-gradient(135deg,#fc8181,#e53e3e); }
  @media (max-width: 1280px){ .stat-row{ grid-template-columns: repeat(2,1fr); } }

  /* Panel */
  .panel { background: var(--panel); border-radius:10px; padding:14px 18px; border:1px solid var(--border); box-shadow:0 2px 6px rgba(0,0,0,.04); margin-bottom:14px; }
  .panel-title { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding-bottom:8px; border-bottom:1px dashed var(--border); }
  .panel-title h3 { margin:0; font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .panel-title .bar { width:3px; height:13px; background:var(--primary); border-radius:2px; }

  .two-col { display:grid; grid-template-columns: 1.2fr 1fr; gap:14px; }
  .two-col-equal { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .three-col { display:grid; grid-template-columns: repeat(3,1fr); gap:14px; }

  .chart-box { height:320px; }
  .chart-box-lg { height:420px; }

  /* Quick entry */
  .quick-grid { display:grid; grid-template-columns: repeat(4,1fr); gap:10px; }
  .quick-item { border:1px solid var(--border); border-radius:8px; padding:14px 8px; text-align:center; cursor:pointer; transition:all .2s; background:#fff; }
  .quick-item:hover { border-color:var(--primary); background:#ebf8ff; transform:translateY(-2px); }
  .quick-item .qi-icon { font-size:24px; color:var(--primary); margin-bottom:4px; }
  .quick-item .qi-name { font-size:13px; font-weight:600; }
  .quick-item .qi-desc { font-size:11px; color:var(--muted); margin-top:2px; }

  /* CAD */
  .cad-container { position:relative; height:500px; background:#0f172a; border-radius:8px; overflow:hidden; }
  .cad-toolbar { position:absolute; top:12px; left:12px; right:12px; display:flex; justify-content:space-between; align-items:center; z-index:10; }
  .cad-title { color:#e2e8f0; font-size:13px; background:rgba(15,23,42,.7); padding:5px 12px; border-radius:6px; }
  .cad-hint { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); background:rgba(15,23,42,.7); color:#cbd5e0; padding:6px 16px; border-radius:6px; font-size:12px; z-index:10; }
  .cad-canvas { width:100%; height:100%; display:block; }

  /* Filters */
  .filter-row { display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  .badge-tag { display:inline-block; padding:2px 8px; border-radius:3px; font-size:12px; }
  .tag-success { background:#c6f6d5; color:#22543d; }
  .tag-warning { background:#feebc8; color:#744210; }
  .tag-danger  { background:#fed7d7; color:#742a2a; }
  .tag-info    { background:#bee3f8; color:#2a4365; }
  .tag-gray    { background:#e2e8f0; color:#2d3748; }

  /* Steps */
  .step-flow { display:flex; justify-content:space-between; padding:10px 0; }
  .step-flow .step { flex:1; text-align:center; position:relative; }
  .step-flow .step .num { width:30px; height:30px; line-height:30px; border-radius:50%; margin:0 auto 5px; background:#e2e8f0; color:var(--muted); font-weight:700; font-size:13px; }
  .step-flow .step.done .num { background:var(--accent); color:#fff; }
  .step-flow .step.active .num { background:var(--primary); color:#fff; }
  .step-flow .step .sname { font-size:12px; }
  .step-flow .step:not(:last-child)::after {
    content:''; position:absolute; top:15px; left:55%; right:-45%; height:2px; background:var(--border);
  }
  .step-flow .step.done:not(:last-child)::after { background:var(--accent); }

  .mission-map { height:380px; background:linear-gradient(135deg,#0f172a,#1e3a5f); border-radius:8px; position:relative; overflow:hidden; }
  .scroll-y { max-height:320px; overflow-y:auto; }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header class="app-header">
    <div class="logo">
      <el-icon :size="22"><aim /></el-icon>
      <span>智壤卫士</span>
      <span class="sub">｜ 无人机地形数据采集与土质分析平台 v1.0</span>
    </div>
    <div class="user-bar">
      <el-badge :value="3"><el-icon :size="18"><bell /></el-icon></el-badge>
      <el-divider direction="vertical" />
      <el-avatar :size="30" style="background:var(--accent)">{{ currentUser.name.charAt(0) }}</el-avatar>
      <span>{{ currentUser.name }}（{{ currentUser.role }}）</span>
      <el-button size="small" @click="logout">退出</el-button>
    </div>
  </header>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <el-menu :default-active="activeMenu" @select="onMenuSelect" background-color="#1e293b" text-color="#cbd5e0" active-text-color="#ffffff" unique-opened>
        <el-menu-item index="dashboard"><el-icon><data-analysis /></el-icon><span>运行仪表盘</span></el-menu-item>

        <el-sub-menu index="collect">
          <template #title><el-icon><aim /></el-icon><span>采集任务管理</span></template>
          <el-menu-item index="mission-list">任务列表</el-menu-item>
          <el-menu-item index="flight-control">飞行控制</el-menu-item>
          <el-menu-item index="gps-track">GPS 航迹</el-menu-item>
          <el-menu-item index="soil-sample">土壤采样</el-menu-item>
        </el-sub-menu>

        <el-sub-menu index="process">
          <template #title><el-icon><cpu /></el-icon><span>数据处理与质检</span></template>
          <el-menu-item index="data-import">数据导入</el-menu-item>
          <el-menu-item index="quality-check">质量校验</el-menu-item>
          <el-menu-item index="reconstruction">3D 重建</el-menu-item>
        </el-sub-menu>

        <el-sub-menu index="ai">
          <template #title><el-icon><magic-stick /></el-icon><span>AI 智能分析</span></template>
          <el-menu-item index="soil-classify">土质分类</el-menu-item>
          <el-menu-item index="disaster-risk">灾害评估</el-menu-item>
          <el-menu-item index="area-calc">面积计算</el-menu-item>
        </el-sub-menu>

        <el-sub-menu index="cad">
          <template #title><el-icon><picture /></el-icon><span>CAD 图纸管理</span></template>
          <el-menu-item index="cad-viewer">图纸查看器</el-menu-item>
          <el-menu-item index="cad-compare">图纸对比</el-menu-item>
        </el-sub-menu>

        <el-sub-menu index="approval">
          <template #title><el-icon><document-checked /></el-icon><span>审批与工作流</span></template>
          <el-menu-item index="approval-list">审批列表</el-menu-item>
          <el-menu-item index="workflow-design">工作流</el-menu-item>
        </el-sub-menu>

        <el-menu-item index="device"><el-icon><monitor /></el-icon><span>设备管理</span></el-menu-item>
      </el-menu>
    </aside>

    <!-- Main Content -->
    <main class="main-area">
      <!-- ======================= Dashboard ======================= -->
      <template v-if="activeMenu === 'dashboard'">
        <div class="page-title">
          <div><h2>运行仪表盘</h2><div class="breadcrumb">首页 / 运行概览</div></div>
          <div>
            <el-button type="primary" size="small" @click="refreshDashboard"><el-icon><refresh /></el-icon>&nbsp;刷新</el-button>
            <el-button size="small" plain>导出报告</el-button>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat-card" v-for="(s,i) in stats" :key="i">
            <div class="info"><div class="label">{{ s.label }}</div><div class="value">{{ s.value }}</div><div class="trend" :class="{ down: s.trend < 0 }">{{ s.trend > 0 ? '↑' : '↓' }} {{ Math.abs(s.trend) }}%</div></div>
            <div class="icon-box" :class="s.iconClass"><el-icon><component :is="s.iconRef" /></el-icon></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title"><h3><span class="bar"></span>快捷入口</h3></div>
          <div class="quick-grid">
            <div class="quick-item" v-for="(q,i) in quickItems" :key="i" @click="onMenuSelect(q.target)">
              <div class="qi-icon"><el-icon><component :is="q.iconRef" /></el-icon></div>
              <div class="qi-name">{{ q.name }}</div>
              <div class="qi-desc">{{ q.desc }}</div>
            </div>
          </div>
        </div>

        <div class="two-col">
          <div class="panel">
            <div class="panel-title">
              <h3><span class="bar"></span>采集任务执行趋势（近 7 日）</h3>
              <el-radio-group v-model="trendRange" size="small" @change="renderTrendChart">
                <el-radio-button value="7">近 7 天</el-radio-button>
                <el-radio-button value="30">近 30 天</el-radio-button>
              </el-radio-group>
            </div>
            <div ref="trendChartRef" class="chart-box"></div>
          </div>
          <div class="panel">
            <div class="panel-title"><h3><span class="bar"></span>土质分类占比</h3></div>
            <div ref="soilPieRef" class="chart-box"></div>
          </div>
        </div>

        <div class="two-col-equal">
          <div class="panel">
            <div class="panel-title"><h3><span class="bar"></span>任务状态分布</h3></div>
            <div ref="statusBarRef" class="chart-box"></div>
          </div>
          <div class="panel">
            <div class="panel-title"><h3><span class="bar"></span>各阶段完成度雷达</h3></div>
            <div ref="radarRef" class="chart-box"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title"><h3><span class="bar"></span>最近采集任务</h3></div>
          <el-table :data="missionList.slice(0,8)" size="default" stripe>
            <el-table-column prop="id" label="任务编号" width="170" />
            <el-table-column prop="area" label="采集区域" />
            <el-table-column prop="operator" label="操作员" width="90" />
            <el-table-column prop="coverage" label="覆盖面积(亩)" width="110" />
            <el-table-column prop="photos" label="照片数" width="80" />
            <el-table-column label="状态" width="90">
              <template #default="{ row }"><span class="badge-tag" :class="'tag-' + statusColor(row.status)">{{ statusText(row.status) }}</span></template>
            </el-table-column>
            <el-table-column prop="date" label="日期" width="110" />
            <el-table-column label="操作" width="140">
              <template #default="{ row }">
                <el-button size="small" link type="primary" @click="viewMission(row)">详情</el-button>
                <el-button size="small" link type="primary" @click="onMenuSelect('flight-control')">监控</el-button>
              </template>
            </el-table-column>
          </el-table>
        </div>

        <div class="two-col-equal">
          <div class="panel">
            <div class="panel-title"><h3><span class="bar"></span>系统日志 / 消息</h3></div>
            <el-timeline>
              <el-timeline-item v-for="(log,i) in systemLogs" :key="i" :timestamp="log.time" :color="log.color">{{ log.msg }}</el-timeline-item>
            </el-timeline>
          </div>
          <div class="panel">
            <div class="panel-title"><h3><span class="bar"></span>设备状态速览</h3></div>
            <el-descriptions :column="1" border size="default">
              <el-descriptions-item label="无人机 M350-003"><el-tag type="success" size="small">在线</el-tag>&nbsp; 电量 78% · 信号 95%</el-descriptions-item>
              <el-descriptions-item label="RTK 基准站"><el-tag type="success" size="small">连接</el-tag>&nbsp; 18 颗卫星 · RTK FIXED</el-descriptions-item>
              <el-descriptions-item label="LiDAR 传感器"><el-tag type="success" size="small">正常</el-tag>&nbsp; 点云频率 240kHz</el-descriptions-item>
              <el-descriptions-item label="多光谱相机"><el-tag type="warning" size="small">待校准</el-tag>&nbsp; 5 通道 · 20MP</el-descriptions-item>
              <el-descriptions-item label="土壤探针"><el-tag type="success" size="small">就绪</el-tag>&nbsp; pH/水分/EC 三合一</el-descriptions-item>
              <el-descriptions-item label="数据处理节点"><el-tag type="info" size="small">繁忙</el-tag>&nbsp; CPU 62% · 内存 8.2/16G</el-descriptions-item>
            </el-descriptions>
          </div>
        </div>
      </template>

      <!-- ======================= Mission List ======================= -->
      <template v-if="activeMenu === 'mission-list'">
        <div class="page-title">
          <div><h2>采集任务列表</h2><div class="breadcrumb">采集任务管理 / 任务列表</div></div>
          <div>
            <el-button type="primary" @click="showMissionDialog = true"><el-icon><plus /></el-icon>&nbsp;新建任务</el-button>
          </div>
        </div>
        <div class="panel">
          <div class="filter-row">
            <el-input v-model="missionFilter.keyword" placeholder="任务编号/区域" style="width:220px;" clearable />
            <el-select v-model="missionFilter.status" placeholder="任务状态" style="width:130px;" clearable>
              <el-option label="已完成" value="completed" />
              <el-option label="进行中" value="processing" />
              <el-option label="待执行" value="pending" />
              <el-option label="异常" value="abnormal" />
            </el-select>
            <el-button type="primary" @click="() => {}">查询</el-button>
          </div>
          <el-table :data="filteredMissions" stripe border>
            <el-table-column type="selection" width="55" />
            <el-table-column prop="id" label="任务编号" width="170" />
            <el-table-column prop="area" label="采集区域" />
            <el-table-column prop="operator" label="操作员" width="90" />
            <el-table-column prop="coverage" label="覆盖面积(亩)" width="115" sortable />
            <el-table-column prop="altitude" label="飞行高度(m)" width="110" />
            <el-table-column prop="photos" label="照片数" width="85" />
            <el-table-column label="状态" width="90">
              <template #default="{ row }"><span class="badge-tag" :class="'tag-' + statusColor(row.status)">{{ statusText(row.status) }}</span></template>
            </el-table-column>
            <el-table-column prop="date" label="日期" width="110" />
            <el-table-column label="操作" width="160">
              <template #default="{ row }">
                <el-button size="small" link type="primary" @click="viewMission(row)">详情</el-button>
                <el-button size="small" link type="primary" @click="onMenuSelect('flight-control')">执行</el-button>
                <el-button size="small" link type="danger">删除</el-button>
              </template>
            </el-table-column>
          </el-table>
        </div>

        <el-dialog v-model="showMissionDialog" title="新建采集任务" width="560px">
          <el-form label-width="100px">
            <el-form-item label="任务名称"><el-input v-model="newMission.name" placeholder="如：望城区乔口镇土地调查" /></el-form-item>
            <el-form-item label="采集区域"><el-input v-model="newMission.area" /></el-form-item>
            <el-form-item label="中心经纬度">
              <el-input v-model="newMission.lng" placeholder="经度" style="width:180px" />
              <el-divider direction="vertical" />
              <el-input v-model="newMission.lat" placeholder="纬度" style="width:180px" />
            </el-form-item>
            <el-form-item label="飞行高度"><el-slider v-model="newMission.altitude" :min="50" :max="300" /></el-form-item>
            <el-form-item label="GPS 模式">
              <el-radio-group v-model="newMission.gpsMode">
                <el-radio value="RTK">RTK 厘米级</el-radio>
                <el-radio value="DGPS">DGPS 分米级</el-radio>
              </el-radio-group>
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="showMissionDialog=false">取消</el-button>
            <el-button type="primary" @click="createMission">创建并规划航线</el-button>
          </template>
        </el-dialog>
      </template>

      <!-- ======================= Flight Control ======================= -->
      <template v-if="activeMenu === 'flight-control'">
        <div class="page-title">
          <div><h2>飞行控制中心</h2><div class="breadcrumb">采集任务管理 / 飞行控制</div></div>
          <div>
            <el-tag type="success" effect="dark">无人机 M350-003 已连接</el-tag>&nbsp;
            <el-button type="primary" @click="startFlight"><el-icon><video-play /></el-icon>&nbsp;开始采集</el-button>
            <el-button type="warning" @click="pauseFlight">暂停</el-button>
            <el-button type="danger" @click="returnToHome">一键返航</el-button>
          </div>
        </div>
        <div class="two-col">
          <div class="panel">
            <div class="panel-title"><h3><span class="bar"></span>任务地图与航线</h3></div>
            <div ref="flightMapRef" class="mission-map" style="height:420px"></div>
            <div class="step-flow" style="margin-top:14px">
              <div class="step done"><div class="num">1</div><div class="sname">任务创建</div></div>
              <div class="step done"><div class="num">2</div><div class="sname">航线规划</div></div>
              <div class="step active"><div class="num">3</div><div class="sname">执行采集中</div></div>
              <div class="step"><div class="num">4</div><div class="sname">数据回传</div></div>
              <div class="step"><div class="num">5</div><div class="sname">成果归档</div></div>
            </div>
          </div>
          <div>
            <div class="panel">
              <div class="panel-title"><h3><span class="bar"></span>实时遥测</h3></div>
              <el-descriptions :column="2" border>
                <el-descriptions-item label="经度">{{ telemetry.lng }}°E</el-descriptions-item>
                <el-descriptions-item label="纬度">{{ telemetry.lat }}°N</el-descriptions-item>
                <el-descriptions-item label="海拔">{{ telemetry.alt }} m</el-descriptions-item>
                <el-descriptions-item label="飞行高度">{{ telemetry.relativeAlt }} m</el-descriptions-item>
                <el-descriptions-item label="地速">{{ telemetry.speed }} m/s</el-descriptions-item>
                <el-descriptions-item label="航向">{{ telemetry.heading }}°</el-descriptions-item>
                <el-descriptions-item label="电量"><el-progress :percentage="telemetry.battery" :stroke-width="10" /></el-descriptions-item>
                <el-descriptions-item label="GPS 卫星">{{ telemetry.sat }} 颗</el-descriptions-item>
              </el-descriptions>
            </div>
            <div class="panel">
              <div class="panel-title"><h3><span class="bar"></span>采集进度</h3></div>

        if (!reconChartRef.value) return;
        const chart = echarts.init(reconChartRef.value);
        const w = 40, h = 30;
        const data = [];
        for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
          let v = 100 + Math.sin(x/5) * 20 + Math.cos(y/4) * 18 + Math.sin(x/2+y/3)*10 + Math.random()*6;
          if (reconLayer.value === 'dem') v = 90 + Math.sin(x/6)*15 + Math.cos(y/5)*16 + Math.random()*3;
          if (reconLayer.value === 'ortho') v = 80 + Math.sin(x/3+y/6)*30 + Math.random()*8;
          if (reconLayer.value === 'pointcloud') v = 110 + Math.sin(x/4)*25 + Math.cos(y/5)*20 + Math.random()*12;
          data.push([x, y, Math.round(v)]);
        }
        chart.setOption({
          tooltip: { position:'top', formatter: p => `高度: ${p.value[2]} m` },
          grid:{ left:20, right:20, top:20, bottom:20 },
          xAxis:{ type:'category', data: Array.from({length:w}, (_,i)=> i), show:false },
          yAxis:{ type:'category', data: Array.from({length:h}, (_,i)=> i), show:false },
          visualMap: { min: 60, max: 160, calculable: true, orient:'horizontal', left:'center', bottom:5,
            inRange: { color:['#313695','#4575b4','#74add1','#abd9e9','#fee090','#fdae61','#f46d43','#d73027','#a50026'] } },
          series: [{ name:'高度', type:'heatmap', data: data, progressive: 1000, animation:false }]
        });
      }

      /* ============ AI Soil Classify Scatter ============ */
      const soilScatterRef = ref(null);
      const soilClassifyPieRef = ref(null);
      const aiSoilResult = ref([]);
      for (let i=1;i<=8;i++) {
        const types = ['壤土','黏土','砂土'];
        const t = types[i % types.length];
        aiSoilResult.value.push({
          sampleId: 'SP-' + String(i).padStart(3,'0'),
          ph:(5.8+Math.random()*2).toFixed(1),
          moisture:(22+Math.random()*25).toFixed(1),
          n:(60 + Math.random()*40).toFixed(0),
          p:(15 + Math.random()*20).toFixed(0),
          k:(100 + Math.random()*80).toFixed(0),
          type: t,
          conf: 80 + Math.floor(Math.random()*18),
          suggestion: ['适合水稻种植','建议改良后种植旱作','需增施有机肥'][i % 3]
        });
      }
      function renderSoilScatter() {
        if (!soilScatterRef.value) return;
        const chart = echarts.init(soilScatterRef.value);
        const colors = { '壤土':'#38a169','黏土':'#4299e1','砂土':'#d69e2e','砾石土':'#9f7aea' };
        chart.setOption({
          tooltip: { trigger:'item' },
          legend:{ bottom:0 },
          grid:{ left:50, right:20, top:20, bottom:40 },
          xAxis:{ name:'pH 值', min:4, max:9 },
          yAxis:{ name:'水分(%)', min:10, max:60 },
          series: ['壤土','黏土','砂土','砾石土'].map(t => ({
            name: t, type:'scatter', symbolSize:14, itemStyle:{ color: colors[t] },
            data: Array.from({length:20}, () => [+(5.5+Math.random()*2.5).toFixed(1), +(18+Math.random()*32).toFixed(1)])
          }))
        });
      }
      function renderSoilClassifyPie() {
        if (!soilClassifyPieRef.value) return;
        const chart = echarts.init(soilClassifyPieRef.value);
        chart.setOption({
          tooltip:{ trigger:'item' }, legend:{ bottom:0 },
          color:['#38a169','#4299e1','#d69e2e','#9f7aea'],
          series:[{ type:'pie', radius:['40%','70%'],
            data:[{name:'壤土',value:45},{name:'黏土',value:28},{name:'砂土',value:18},{name:'砾石土',value:9}],
            label:{ formatter:'{b}\n{d}%' } }]
        });
      }

      /* ============ Disaster Risk ============ */
      const riskHeatmapRef = ref(null);
      const disasterRisks = ref([
        { type:'滑坡', level:'低', levelColor:'success', area:42, desc:'区域地形整体平缓，坡度小于 15°', action:'定期巡查' },
        { type:'洪涝', level:'中', levelColor:'warning', area:186, desc:'雨季排水系统一般，部分低洼地区存在积水风险', action:'完善排水设施' },
        { type:'泥石流', level:'低', levelColor:'success', area:28, desc:'植被覆盖率良好，土壤稳定', action:'植被保护' },
        { type:'地面沉降', level:'监测', levelColor:'info', area: 58, desc:'年沉降率约 1.2 cm，需持续监测', action:'GPS 监测网' },
        { type:'土壤侵蚀', level:'中', levelColor:'warning', area: 124, desc:'部分耕地存在水蚀现象', action:'退耕还林、梯田' }
      ]);
      function renderRiskHeatmap() {
        if (!riskHeatmapRef.value) return;
        const chart = echarts.init(riskHeatmapRef.value);
        const w=24, h=18, data=[];
        for (let y=0; y<h; y++) for (let x=0; x<w; x++) {
          const v = Math.round(10 + Math.sin(x/3)*15 + Math.cos(y/4)*10 + Math.random()*35);
          data.push([x,y,v]);
        }
        chart.setOption({
          tooltip:{ position:'top' },
          grid:{ left:30, right:30, top:20, bottom:40 },
          xAxis:{ type:'category', show:false },
          yAxis:{ type:'category', show:false },
          visualMap:{ min:0, max:100, calculable:true, orient:'horizontal', left:'center', bottom:5,
            inRange:{ color:['#38a169','#f6e05e','#ed8936','#e53e3e'] } },
          series:[{ name:'风险指数', type:'heatmap', data }]
        });
      }

      /* ============ Area Calc ============ */
      const areaCompareRef = ref(null);
      const plotAreas = ref([]);
      const plotNames = ['张三家承包地','村集体水田','李四旱地','王五菜地','村小学用地','果园基地','鱼塘周边','林场边界'];
      for (let i=0;i<8;i++) {
        const reg = 80 + Math.random()*150;
        plotAreas.value.push({
          id: 'P-' + String(i+1).padStart(3,'0'),
          name: plotNames[i],
          gpsArea: +(reg + (Math.random()*10 - 5)).toFixed(2),
          registeredArea: +reg.toFixed(2),
          diff: +(Math.random()*10 - 5).toFixed(2)
        });
      }
      function renderAreaCompare() {
        if (!areaCompareRef.value) return;
        const chart = echarts.init(areaCompareRef.value);
        chart.setOption({
          tooltip:{ trigger:'axis' },
          legend:{ data:['GPS 测量(亩)','登记面积(亩)','差异(亩)'], bottom:0 },
          grid:{ left:50, right:40, top:20, bottom:40 },
          xAxis:{ type:'category', data: plotAreas.value.map(p=>p.name), axisLabel:{ rotate:20 } },
          yAxis:[{ type:'value', name:'面积' },{ type:'value', name:'差异' }],
          series:[
            { name:'GPS 测量(亩)', type:'bar', data: plotAreas.value.map(p=>p.gpsArea), itemStyle:{ color:'#2b6cb0' } },
            { name:'登记面积(亩)', type:'bar', data: plotAreas.value.map(p=>p.registeredArea), itemStyle:{ color:'#718096' } },
            { name:'差异(亩)', type:'line', yAxisIndex:1, smooth:true, data: plotAreas.value.map(p=>p.diff), itemStyle:{ color:'#e53e3e' }, lineStyle:{ width:3 } }
          ]
        });
      }

      /* ============ CAD Viewer ============ */
      const cadCanvasRef = ref(null);
      const cadLayers = ref(['boundary','contour','sample','road','label']);
      let cadScale = 1;
      let cadOffsetX = 0, cadOffsetY = 0;
      let _cadCtx = null;

      function renderCAD() {
        const canvas = cadCanvasRef.value;
        if (!canvas) return;
        // resize
        const parent = canvas.parentElement;
        const rect = parent.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        const ctx = canvas.getContext('2d'); _cadCtx = ctx;
        ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,canvas.width,canvas.height);

        // grid
        ctx.strokeStyle = 'rgba(100,120,160,0.25)'; ctx.lineWidth = 1;
        const step = 30 * cadScale;
        for (let x = 0; x < canvas.width; x += step) {
          ctx.beginPath(); ctx.moveTo(x + cadOffsetX % step, 0); ctx.lineTo(x + cadOffsetX % step, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += step) {
          ctx.beginPath(); ctx.moveTo(0, y + cadOffsetY % step); ctx.lineTo(canvas.width, y + cadOffsetY % step); ctx.stroke();
        }

        const cx = canvas.width/2, cy = canvas.height/2;

        // boundary (polygon)
        if (cadLayers.value.includes('boundary')) {
          ctx.strokeStyle = '#48bb78'; ctx.lineWidth = 2.2;
          ctx.beginPath();
          const poly = [[-200,-120],[-80,-180],[120,-160],[200,-40],[160,100],[20,180],[-160,140],[-220,20]];
          poly.forEach((p,i) => { const x = cx + p[0]*cadScale, y=cy+p[1]*cadScale; i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
          ctx.closePath(); ctx.stroke();
        }
        // contours
        if (cadLayers.value.includes('contour')) {
          ctx.strokeStyle = 'rgba(66,153,225,0.7)'; ctx.lineWidth = 1;
          for (let k = 0; k < 8; k++) {
            ctx.beginPath();
            for (let x = -260; x <= 260; x += 5) {
              const y = Math.sin((x + k*40)/60) * (50 - k*3) + k*10 - 30;
              const px = cx + x*cadScale, py = cy + y*cadScale;
              x === -260 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
            }
            ctx.stroke();
          }
        }
        // samples
        if (cadLayers.value.includes('sample')) {
          const samples = [[-120,-60],[-40,-110],[80,-50],[140,40],[20,100],[-100,80]];
          samples.forEach((p,i) => {
            const x = cx + p[0]*cadScale, y = cy + p[1]*cadScale;
            ctx.fillStyle = '#d69e2e'; ctx.beginPath(); ctx.arc(x,y,5*cadScale,0,Math.PI*2); ctx.fill();
            if (cadLayers.value.includes('label')) {
              ctx.fillStyle = '#e2e8f0'; ctx.font = '12px sans-serif';
              ctx.fillText('SP-' + String(i+1).padStart(3,'0'), x+8, y-5);
            }
          });
        }
        // roads
        if (cadLayers.value.includes('road')) {
          ctx.strokeStyle = 'rgba(255,215,0,0.85)'; ctx.lineWidth = 4;
          ctx.beginPath(); ctx.moveTo(cx - 280*cadScale, cy - 150*cadScale); ctx.lineTo(cx + 280*cadScale, cy + 160*cadScale); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx - 250*cadScale, cy + 100*cadScale); ctx.lineTo(cx + 260*cadScale, cy - 80*cadScale); ctx.stroke();
        }
      }
      function saveCAD() {
        const canvas = cadCanvasRef.value;
        if (!canvas) return;
        ElementPlus.ElMessage.success('图纸已保存为 PNG（示意）');
        try {
          const link = document.createElement('a');
          link.download = 'ZRS-2026-0617.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch(e) {}
      }
      function toggleCADFullscreen() {
        const c = cadCanvasRef.value; if (!c) return;
        if (document.fullscreenElement) { document.exitFullscreen(); }
        else c.parentElement.requestFullscreen?.();
      }
      function resetCAD() { cadScale=1; cadOffsetX=0; cadOffsetY=0; renderCAD(); ElementPlus.ElMessage.info('视图已复位'); }
      function zoomInCAD() { cadScale = Math.min(cadScale * 1.2, 5); renderCAD(); }
      function zoomOutCAD() { cadScale = Math.max(cadScale / 1.2, 0.3); renderCAD(); }

      /* ============ Approval ============ */
      const approvalList = ref([
        { title:'望城区乔口镇土地调查成果审批', type:'数据成果审批', initiator:'王工', currentNode:'审核', step:2, missionId:'ZRS-2026-0617-001', createdAt:'2026-06-17 14:30' },
        { title:'无人机外出报备（长沙县）', type:'外出报备', initiator:'李工', currentNode:'校核', step:1, missionId:'ZRS-2026-0618-002', createdAt:'2026-06-18 09:10' },
        { title:'物资申领（RTK 基准站配件）', type:'物资审批', initiator:'张工', currentNode:'批准', step:3, missionId:'-', createdAt:'2026-06-17 16:00' },
        { title:'岳麓区莲花镇 AI 分析成果审核', type:'AI 成果', initiator:'王工', currentNode:'审核', step:2, missionId:'ZRS-2026-0616-003', createdAt:'2026-06-16 15:40' },
        { title:'雨区跳马镇面积差异复核', type:'差异处理', initiator:'李工', currentNode:'校核', step:1, missionId:'ZRS-2026-0616-002', createdAt:'2026-06-19 10:20' }
      ]);
      const showApprovalVisible = ref(false);
      const currentApproval = ref({});
      const approvalComment = ref('');
      function showApprovalDialog(row) { currentApproval.value = row; approvalComment.value = ''; showApprovalVisible.value = true; }
      function approveOK() { ElementPlus.ElMessage.success('审批已通过，流程进入下一节点'); showApprovalVisible.value = false; }
      function rejectApproval() { ElementPlus.ElMessage.warning('已驳回审批申请'); showApprovalVisible.value = false; }

      /* ============ Sensors ============ */
      const sensorList = ref([
        { name:'M350-003 相机', type:'可见光 2000 万像素', status:'正常', lastCheck:'2026-06-17' },
        { name:'多光谱相机', type:'5 波段', status:'正常', lastCheck:'2026-06-16' },
        { name:'LiDAR Livox Mid-70', type:'激光雷达', status:'正常', lastCheck:'2026-06-17' },
        { name:'RTK 基准站 Septentrio', type:'GNSS 接收机', status:'正常', lastCheck:'2026-06-18' },
        { name:'土壤三参数速测仪', type:'pH/水分/EC', status:'待校准', lastCheck:'2026-06-10' },
        { name:'无人机地面站', type:'控制终端', status:'正常', lastCheck:'2026-06-18' }
      ]);

      /* ============ 渲染各模块图表 ============ */
      function renderModuleCharts(key) {
        if (key === 'dashboard') { renderTrendChart(); renderSoilPie(); renderStatusBar(); renderRadar(); }
        else if (key === 'flight-control') { renderFlightMap(); renderAltitudeChart(); startFlight(); }
        else if (key === 'gps-track') { renderGpsMap(); }
        else if (key === 'quality-check') { renderQualityBar(); }
        else if (key === 'reconstruction') { renderRecon(); }
        else if (key === 'soil-classify') { renderSoilScatter(); renderSoilClassifyPie(); }
        else if (key === 'disaster-risk') { renderRiskHeatmap(); }
        else if (key === 'area-calc') { renderAreaCompare(); }
        else if (key === 'cad-viewer') { nextTick(renderCAD); }
      }

      /* ============ 全局键盘事件 ============ */
      function onKey(e) {
        if (activeMenu.value !== 'cad-viewer') return;
        if (e.key === 'Escape' && document.fullscreenElement) document.exitFullscreen?.();
        if (e.key === 'f' || e.key === 'F') toggleCADFullscreen();
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') { e.preventDefault(); saveCAD(); }
      }

      /* ============ 登出 ============ */
      function logout() {
        ElementPlus.ElMessageBox.confirm('确认退出当前账号？', '提示', { confirmButtonText:'确定', cancelButtonText:'取消', type:'warning' })
          .then(() => { window.location.href = 'login.html'; }).catch(()=>{});
      }

      /* ============ 生命周期 ============ */
      onMounted(() => {
        nextTick(() => renderModuleCharts('dashboard'));
        window.addEventListener('resize', () => {
          [trendChartRef, soilPieRef, statusBarRef, radarRef,
           flightMapRef, altitudeChartRef, gpsMapRef,
           qualityBarRef, reconChartRef, soilScatterRef,
           soilClassifyPieRef, riskHeatmapRef, areaCompareRef].forEach(ref => {
            if (ref && ref.value) {
              const inst = echarts.getInstanceByDom(ref.value);
              if (inst) inst.resize();
            }
          });
        });
        window.addEventListener('keydown', onKey);
      });

      return {
        currentUser, activeMenu, onMenuSelect, stats, quickItems,
        missionList, statusText, statusColor, missionFilter, filteredMissions,
        showMissionDialog, newMission, createMission, viewMission,
        systemLogs, trendRange, trendChartRef, soilPieRef, statusBarRef, radarRef,
        refreshDashboard,
        telemetry, flightProgress, capturedPhotos, startFlight, pauseFlight, returnToHome, flightMapRef, altitudeChartRef,
        gpsMapRef, gpsLive, gpsTrackPoints,
        soilStats, soilSamples, soilTagColor,
        processingStages,
        qualityBarRef, qualityItems,
        reconLayer, reconChartRef, renderRecon,
        soilScatterRef, soilClassifyPieRef, aiSoilResult,
        riskHeatmapRef, disasterRisks,
        areaCompareRef, plotAreas,
        cadCanvasRef, cadLayers, renderCAD, saveCAD, toggleCADFullscreen, resetCAD, zoomInCAD, zoomOutCAD,
        approvalList, showApprovalVisible, currentApproval, approvalComment, showApprovalDialog, approveOK, rejectApproval,
        sensorList,
        logout, iconResolve
      };
    }
  });

  /* 注册 Element Plus */
  app.use(ElementPlus);

  /* 注册所有图标（同时注册原始名 + kebab-case，方便模板用字符串引用） */
  for (const [name, comp] of Object.entries(ElementPlusIconsVue)) {
    app.component(name, comp);
    const kebab = name.replace(/([A-Z])/g,'-$1').toLowerCase().replace(/^-/, '');
    if (kebab !== name) app.component(kebab, comp);
  }

  /* 构造一个图标名称 -> 组件引用 的查找表，方便 data 中用字符串 */
  window.__iconMap = {};
  for (const [name, comp] of Object.entries(ElementPlusIconsVue)) {
    window.__iconMap[name] = comp;
    const kebab = name.replace(/([A-Z])/g,'-$1').toLowerCase().replace(/^-/, '');
    window.__iconMap[kebab] = comp;
  }

  app.mount('#app');
</script>
</body>
</html>
