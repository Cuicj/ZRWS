spring:
  application:
    name: zrws-approval

  # Spring AI 2.0 GA 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
          max-tokens: 2000

  # 数据库配置（阿里云RDS）
  datasource:
    url: jdbc:mysql://rm-bp1g8sw85a5z9e8gzeo.mysql.rds.aliyuncs.com:3306/zrws_approval?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: test_admin
    password: Test_admin
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

# Flowable 7.0.0 配置
flowable:
  database-schema-update: true
  async-executor-activate: true
  history-level: full
  rest-api:
    enabled: false

server:
  port: 5571
  servlet:
    context-path: /approval

# Spring Cloud 配置
spring.cloud:
  # 服务发现
  discovery:
    enabled: true
  # 负载均衡
  loadbalancer:
    ribbon:
      enabled: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# AI数据分析器配置
app:
  dataimport:
    upload-path: uploads/dataimport
    max-file-size: 50MB
    allowed-extensions: xlsx,xls,csv,json

# Spring AI 分析器配置
spring-ai-analyzer:
  temperature: 0.3
  max-tokens: 2000
  quality-threshold: 70

# Feign配置
feign:
  client:
    config:
      default:
        loggerLevel: basic
        connectTimeout: 5000
        readTimeout: 5000
  httpclient:
    enabled: true
  compression:
    request:
      enabled: true
    response:
      enabled: true

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# 日志配置
logging:
  level:
    com.zrws: debug
    org.flowable: info
    org.springframework.ai: debug
    org.springframework.cloud.openfeign: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 支付宝支付配置
alipay:
  app-id: ${ALIPAY_APP_ID:your-alipay-app-id}
  private-key: ${ALIPAY_PRIVATE_KEY:your-alipay-private-key}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:your-alipay-public-key}
  server-url: https://openapi.alipay.com/gateway.do
  charset: UTF-8
  sign-type: RSA2
  format: JSON
  notify-url: https://www.zrws.cloud/approval/api/v1/payment/alipay/notify

# ZRWS 自定义配置
zrws:
  # Mock 数据开关
  mock:
    enabled: false
  # DBA 数据库 Schema 自动同步
  dba:
    enabled: true
    auto-sync-on-startup: true
    entity-package: com.zrws.approval.domain.entity
    mapper-locations: classpath*:/mapper/**/*.xml
    sql-init-location: classpath*:/sql/*.sql
    exclude-table-prefixes:
      - ACT_
      - act_
      - FLW_
      - flw_
    verbose: true
    fail-on-sync-error: false
  # OAuth 配置（支付宝/微信网页授权）
  oauth:
    alipay:
      app-id: ${ALIPAY_APP_ID:your-alipay-app-id}
      redirect-uri: https://www.zrws.cloud/approval/api/v1/oauth/alipay/callback
    wechat:
      app-id: ${WECHAT_APP_ID:your-wechat-app-id}
      app-secret: ${WECHAT_APP_SECRET:your-wechat-app-secret}
      redirect-uri: https://www.zrws.cloud/approval/api/v1/oauth/wechat/callback