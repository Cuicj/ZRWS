spring:
  application:
    name: zrws-approval

  # Spring AI 2.0 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
          max-tokens: 2000

  # 数据库配置（阿里云RDS）
  datasource:
    url: jdbc:mysql://rm-bp1g8sw85a5z9e8gzeo.mysql.rds.aliyuncs.com:3306/zrws_approval?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: test_admin
    password: Test_admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Flowable 配置
  flowable:
    database-schema-update: true
    async-executor-activate: true
    history-level: full

server:
  port: 5571
  servlet:
    context-path: /approval

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.zrws: debug
    org.flowable: info
    org.springframework.ai: debug