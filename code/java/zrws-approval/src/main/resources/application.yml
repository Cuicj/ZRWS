spring:
  application:
    name: zrws-approval

  # Spring AI 2.0 GA 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
          max-tokens: 2000
      embedding:
        options:
          model: text-embedding-3-small

  # 数据库配置（阿里云RDS）
  datasource:
    url: jdbc:mysql://rm-bp1g8sw85a5z9e8gzeo.mysql.rds.aliyuncs.com:3306/zrws_approval?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: test_admin
    password: Test_admin
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  # Flowable 7.0 配置
  flowable:
    database-schema-update: true
    async-executor-activate: true
    history-level: full
    app:
      rest-enabled: true

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

server:
  port: 5571
  servlet:
    context-path: /approval

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# AI数据分析器配置
app:
  dataimport:
    upload-path: uploads/dataimport
    max-file-size: 50MB
    allowed-extensions: xlsx,xls,csv,json

# Spring AI 分析器配置
spring-ai-analyzer:
  temperature: 0.3
  max-tokens: 2000
  quality-threshold: 70

# 日志配置
logging:
  level:
    com.zrws: debug
    org.flowable: info
    org.springframework.ai: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"